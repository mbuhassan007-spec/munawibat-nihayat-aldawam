<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

/* =======================
   الصفحة
======================= */
.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

/* =======================
   الكليشة
======================= */
.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:70px;
  height:70px;
  background:#fff;
  object-fit:contain;
  padding:3px;
  border-radius:4px;
}

.centerText{
  text-align:center;
  flex:1;
}

.title{
  font-weight:bold;
  font-size:16px;
  margin-top:5px;
}

input{
  padding:3px;
  border-radius:3px;
  border:none;
  margin:2px;
  width:180px;
}

/* =======================
   أقسام
======================= */
.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

/* =======================
   جداول
======================= */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
  background:#fff;
}

th{font-weight:bold;}

/* =======================
   أزرار
======================= */
button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px 10px;
  margin:5px;
  cursor:pointer;
}

/* =======================
   QR
======================= */
#qrcode{
  margin-top:10px;
}

/* =======================
   لوحة التحكم
======================= */
#dashboard{
  display:none;
  padding:10px;
}

.card{
  background:#fff;
  padding:10px;
  margin:8px;
  border-right:5px solid #1f6f3a;
}

</style>
</head>

<body>

<!-- =======================
     النظام الرئيسي
======================= -->
<div id="main">

<div class="page" id="report">

<!-- الكليشة -->
<div class="header">

<div class="headerRow">

<img id="moeLogo" class="logo">

<div class="centerText">

<div>وزارة التعليم</div>

<div>
الإدارة العامة للتعليم:
<input id="eduName" placeholder="اسم الإدارة">
</div>

<div>
مدرسة:
<input id="schoolNameHeader" placeholder="اسم المدرسة">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<img id="schoolLogo" class="logo">

</div>

</div>

<!-- بيانات -->
<div class="section">

<label>العام</label><br>
<input id="year">

<label>الفصل</label><br>
<input id="term">

<label>اليوم</label><br>
<input id="day">

<label>التاريخ</label><br>
<input id="date">

</div>

<!-- الموظف -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><input id="staffNote"></td>
</tr>
</table>

</div>

<!-- المتأخرون -->
<div class="section">

<label>المتأخرون</label>
<table id="lateTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>
<button onclick="addRow('lateTable')">إضافة</button>

</div>

<!-- المخالفون -->
<div class="section">

<label>المخالفون</label>
<table id="vioTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>
<button onclick="addRow('vioTable')">إضافة</button>

</div>

<!-- QR -->
<div class="section">

<label>رمز التحقق QR</label>
<div id="qrcode"></div>

</div>

</div>

<!-- أزرار -->
<div style="text-align:center">

<button onclick="generateQR();saveReport();sendWhatsApp();">حفظ وإرسال</button>
<button onclick="window.print()">PDF</button>
<button onclick="openDashboard()">لوحة التحكم</button>

</div>

</div>

<!-- =======================
     لوحة التحكم
======================= -->
<div id="dashboard">

<h2>📊 لوحة التحكم</h2>

<div id="list"></div>

<button onclick="back()">رجوع</button>

</div>

<script>

/* =======================
   ID لكل استمارة
======================= */
let reportId = Date.now();

/* =======================
   QR
======================= */
function generateQR(){

  document.getElementById("qrcode").innerHTML = "";

  let data = {
    id: reportId,
    school: document.getElementById("schoolNameHeader").value,
    date: document.getElementById("date").value
  };

  new QRCode(document.getElementById("qrcode"), {
    text: JSON.stringify(data),
    width:120,
    height:120
  });

}

/* =======================
   حفظ محلي
======================= */
function saveReport(){

  let data = {
    id:reportId,
    school:document.getElementById("schoolNameHeader").value,
    date:document.getElementById("date").value,
    staff:document.getElementById("staffName").value,
    note:document.getElementById("staffNote").value
  };

  localStorage.setItem("report_"+reportId, JSON.stringify(data));

}

/* =======================
   WhatsApp
======================= */
function sendWhatsApp(){

  let text = "📋 استمارة مناوبة\n\n";

  text += "الإدارة: الإدارة العامة للتعليم\n";
  text += "المدرسة: " + document.getElementById("schoolNameHeader").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n\n";

  text += "📝 ملاحظات:\n" + document.getElementById("staffNote").value + "\n";

  text += "\n✅ تم تعبئة الاستمارة بنجاح";

  window.open("https://wa.me/?text="+encodeURIComponent(text));

}

/* =======================
   إضافة صف
======================= */
function addRow(id){
  let row = document.getElementById(id).insertRow();
  row.innerHTML = `<td><input></td><td><input></td><td><input></td><td><input></td><td><input></td>`;
}

/* =======================
   لوحة التحكم
======================= */
function openDashboard(){

  document.getElementById("main").style.display="none";
  document.getElementById("dashboard").style.display="block";

  let list = document.getElementById("list");
  list.innerHTML="";

  for(let i=0;i<localStorage.length;i++){

    let key = localStorage.key(i);
    if(!key.includes("report_")) continue;

    let d = JSON.parse(localStorage.getItem(key));

    list.innerHTML += `
      <div class="card">
        <b>${d.school}</b><br>
        ${d.date}<br>
        ${d.staff}<br>
      </div>
    `;
  }
}

function back(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("main").style.display="block";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير المناوبة اليومي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family: "Arial";
  background:#fff;
  margin:0;
  padding:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:12mm;
  box-sizing:border-box;
}

/* الكليشة الرسمية */
.header{
  text-align:center;
  border:2px solid #000;
  padding:10px;
  margin-bottom:10px;
}

.header .ministry{
  font-size:14px;
  font-weight:bold;
}

.header .edu{
  font-size:13px;
}

.header .title{
  font-size:16px;
  margin-top:5px;
  font-weight:bold;
}

/* أقسام */
.section{
  margin-top:10px;
  border:1px solid #000;
  padding:8px;
}

label{
  font-weight:bold;
  font-size:13px;
}

input{
  width:100%;
  padding:5px;
  margin-top:3px;
  border:1px solid #000;
}

/* جداول */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:5px;
}

th,td{
  border:1px solid #000;
  padding:5px;
  text-align:center;
  font-size:12px;
}

/* أزرار */
.actions{
  text-align:center;
  margin:10px;
}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

/* إخفاء الأزرار في الطباعة */
@media print{
  .actions{display:none;}
}
</style>
</head>

<body>

<div class="page" id="report">

<!-- الكليشة -->
<div class="header">
  <div class="ministry">وزارة التعليم</div>
  <div class="edu">الإدارة العامة للتعليم ................................</div>
  <div class="title">تقرير المناوبة اليومي</div>
</div>

<!-- بيانات أساسية -->
<div class="section">
<label>اسم المدرسة</label>
<input id="school">

<label>العام الدراسي</label>
<input id="year">

<label>الفصل الدراسي</label>
<input id="term">

<label>اليوم</label>
<input id="day">

<label>التاريخ</label>
<input type="date" id="date">
</div>

<!-- الموظف -->
<div class="section">
<label>الموظف المناوب</label>
<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><input id="staffNote"></td>
</tr>
</table>
</div>

<!-- المتأخرون -->
<div class="section">
<label>الطلاب المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button type="button" onclick="addLate()">+ إضافة طالب</button>
</div>

<!-- المخالفون -->
<div class="section">
<label>الطلاب المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button type="button" onclick="addVio()">+ إضافة طالب</button>
</div>

<!-- التوقيعات -->
<div class="section">
<label>وكيل الشؤون التعليمية</label>
<input id="agent">

<label>مدير المدرسة</label>
<input id="principal">
</div>

<!-- العبارة -->
<div class="section" style="text-align:center;font-size:13px;">
يتم تسليم هذا التقرير إلى وكيل الشؤون التعليمية في اليوم التالي للمناوبة.
</div>

<div style="text-align:center;font-size:11px;">
حقوق التصميم محفوظة: مصطفى بوحسن
</div>

</div>

<!-- الأزرار -->
<div class="actions">
<button onclick="downloadPDF()">حفظ PDF</button>
<button onclick="sendWhatsApp()">إرسال واتساب</button>
</div>

<script>

/* إضافة صفوف ديناميكية */
function addLate(){
  const table = document.getElementById("lateTable");
  const row = table.insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

function addVio(){
  const table = document.getElementById("vioTable");
  const row = table.insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

/* PDF */
function getFileName(){
  const date = document.getElementById("date").value || new Date().toISOString().split('T')[0];
  return "تقرير_المناوبة_" + date + ".pdf";
}

function downloadPDF(){
  html2pdf().set({
    margin:0,
    filename:getFileName(),
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(document.getElementById("report")).save();
}

/* WhatsApp */
function sendWhatsApp(){

  let text = "تقرير المناوبة اليومي\n\n";

  text += "المدرسة: " + document.getElementById("school").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n";

  text += "\nتم إعداد التقرير إلكترونيًا.";

  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

</script>

</body>
</html>

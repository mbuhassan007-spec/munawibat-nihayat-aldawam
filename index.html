<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<style>

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logoBox{
  width:75px;
  height:75px;
  background:#fff;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logoBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.centerText{
  text-align:center;
  flex:1;
}

.title{
  font-size:16px;
  font-weight:bold;
}

input{
  padding:4px;
  border:1px solid #ccc;
  border-radius:3px;
}

.inlineField{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
  margin-top:5px;
}

.inlineField input{
  width:150px;
}

textarea{
  width:100%;
  min-height:50px;
  padding:4px;
  resize:vertical;
}

.row{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.row div{
  flex:1;
}

.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

.actions{
  text-align:center;
  margin:10px;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px;
  margin:5px;
  cursor:pointer;
}

@media print{
  .actions{display:none;}
  body{background:#fff;}
}

</style>
</head>

<body>

<div class="page" id="report">

<div class="header">
<div class="headerRow">

<label class="logoBox">
  <img id="moeLogo">
  <input type="file" accept="image/*" onchange="loadLogo(event,'moe')" hidden>
</label>

<div class="centerText">

<div>وزارة التعليم</div>

<div class="inlineField">
الإدارة العامة للتعليم:
<input id="eduName">
</div>

<div class="inlineField">
مدرسة:
<input id="schoolNameHeader">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<label class="logoBox">
  <img id="schoolLogo">
  <input type="file" accept="image/*" onchange="loadLogo(event,'school')" hidden>
</label>

</div>
</div>

<div class="section">

<div class="row">
<div>
<label>العام الدراسي</label>
<input id="year">
</div>

<div>
<label>الفصل الدراسي</label>
<input id="term">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>التاريخ</label>
<input type="date" id="date">
</div>
</div>

</div>

<div class="section">

<label>الموظف المناوب</label>

<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><textarea id="staffNote"></textarea></td>
</tr>
</table>

</div>

<div class="section">

<label>المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('lateTable')">إضافة</button>

</div>

<div class="section">

<label>المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('vioTable')">إضافة</button>

</div>

</div>

<div class="actions">

<button onclick="handleSubmit()">حفظ وإرسال</button>
<button onclick="window.print()">PDF</button>

</div>

<script>

let reportId = Date.now();

function loadLogo(event,type){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    if(type==="moe"){
      document.getElementById("moeLogo").src = e.target.result;
    }else{
      document.getElementById("schoolLogo").src = e.target.result;
    }
  };
  reader.readAsDataURL(file);
}

function saveReport(){
  localStorage.setItem("report_"+reportId, JSON.stringify({
    staff:document.getElementById("staffName").value
  }));
}

function sendWhatsApp(){

  let text = "📋 استمارة مناوبة نهاية الدوام\n\n";

  text += "الإدارة: " + document.getElementById("eduName").value + "\n";
  text += "المدرسة: " + document.getElementById("schoolNameHeader").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n\n";

  text += "📝 ملاحظات الموظف:\n" + document.getElementById("staffNote").value + "\n";

  text += "\n⏰ المتأخرون:\n";
  document.querySelectorAll("#lateTable tr").forEach((r,i)=>{
    if(i===0)return;
    let c=r.querySelectorAll("input,textarea");
    text += "- " + [...c].map(x=>x.value||"-").join(" | ") + "\n";
  });

  text += "\n⚠️ المخالفون:\n";
  document.querySelectorAll("#vioTable tr").forEach((r,i)=>{
    if(i===0)return;
    let c=r.querySelectorAll("input,textarea");
    text += "- " + [...c].map(x=>x.value||"-").join(" | ") + "\n";
  });

  text += "\n✅ تم تعبئة الاستمارة بنجاح";

  window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function handleSubmit(){
  try{saveReport();}catch(e){}
  try{sendWhatsApp();}catch(e){alert("خطأ في الإرسال");}
}

function addRow(id){
  let r=document.getElementById(id).insertRow();
  r.innerHTML=`
  <td><input></td>
  <td><input></td>
  <td><input></td>
  <td><input></td>
  <td><textarea></textarea></td>
  `;
}

</script>

</body>
</html>

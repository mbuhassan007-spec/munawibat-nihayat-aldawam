<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hijri-date/lib/safe.min.js"></script>

<style>

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logoBox{
  width:75px;
  height:75px;
  background:#fff;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logoBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.centerText{
  text-align:center;
  flex:1;
}

.title{
  font-size:16px;
  font-weight:bold;
}

input{
  width:100%;
  padding:4px;
  border:1px solid #ccc;
  border-radius:3px;
}

textarea{
  width:100%;
  min-height:50px;
  padding:4px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.row div{
  flex:1;
}

.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

.actions{
  text-align:center;
  margin:10px;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px;
  margin:5px;
  cursor:pointer;
}

@media print{
  .actions{display:none;}
  body{background:#fff;}
}

</style>
</head>

<body>

<div class="page" id="report">

<!-- الكليشة -->
<div class="header">
<div class="headerRow">

<label class="logoBox">
  <img id="moeLogo">
  <input type="file" accept="image/*" onchange="loadLogo(event,'moe')" hidden>
</label>

<div class="centerText">

<div>وزارة التعليم</div>

<div>
الإدارة العامة للتعليم:
<input id="eduName">
</div>

<div>
مدرسة:
<input id="schoolNameHeader">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<label class="logoBox">
  <img id="schoolLogo">
  <input type="file" accept="image/*" onchange="loadLogo(event,'school')" hidden>
</label>

</div>
</div>

<!-- البيانات -->
<div class="section">

<div class="row">
<div>
<label>العام الدراسي</label>
<input id="year">
</div>

<div>
<label>الفصل الدراسي</label>
<input id="term">
</div>
</div>

<div class="row">

<div>
<label>التاريخ (ميلادي)</label>
<input id="dateGreg" type="date" onchange="convertToHijri()">
</div>

<div>
<label>التاريخ (هجري)</label>
<input id="dateHijri" readonly>
</div>

</div>

</div>

<!-- الموظف -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><textarea id="staffNote"></textarea></td>
</tr>
</table>

</div>

<!-- المتأخرون -->
<div class="section">

<label>المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('lateTable')">إضافة</button>

</div>

<!-- المخالفون -->
<div class="section">

<label>المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('vioTable')">إضافة</button>

</div>

<!-- QR -->
<div class="section">
<label>QR</label>
<div id="qrcode"></div>
</div>

</div>

<!-- الأزرار -->
<div class="actions">
<button onclick="handleSubmit()">حفظ وإرسال</button>
<button onclick="window.print()">PDF</button>
</div>

<script>

let reportId = Date.now();

/* رفع الصور */
function loadLogo(event,type){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    if(type==="moe"){
      document.getElementById("moeLogo").src = e.target.result;
    }else{
      document.getElementById("schoolLogo").src = e.target.result;
    }
  };
  reader.readAsDataURL(file);
}

/* تحويل هجري */
function convertToHijri(){

  const g = document.getElementById("dateGreg").value;
  if(!g) return;

  const d = new Date(g);
  const h = new HijriDate(d);

  document.getElementById("dateHijri").value =
    h.getFullYear()+"/"+(h.getMonth()+1)+"/"+h.getDate();

}

/* QR */
function generateQR(){
  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"),{
    text:JSON.stringify({
      id:reportId,
      school:document.getElementById("schoolNameHeader").value
    }),
    width:120,
    height:120
  });
}

/* حفظ */
function saveReport(){
  localStorage.setItem("report_"+reportId, "saved");
}

/* واتساب */
function sendWhatsApp(){

  let text="📋 استمارة مناوبة نهاية الدوام\n\n";

  text+="الإدارة: الإدارة العامة للتعليم\n";
  text+="المدرسة: "+document.getElementById("schoolNameHeader").value+"\n";
  text+="الميلادي: "+document.getElementById("dateGreg").value+"\n";
  text+="الهجري: "+document.getElementById("dateHijri").value+"\n\n";

  text+="📝 ملاحظات:\n"+document.getElementById("staffNote").value+"\n\n";

  text+="✅ تم تعبئة الاستمارة بنجاح";

  window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* تنفيذ */
function handleSubmit(){
  try{generateQR();}catch(e){}
  try{saveReport();}catch(e){}
  try{sendWhatsApp();}catch(e){alert("خطأ في الإرسال");}
}

/* إضافة صف */
function addRow(id){
  let r=document.getElementById(id).insertRow();
  r.innerHTML=`
  <td><input></td>
  <td><input></td>
  <td><input></td>
  <td><input></td>
  <td><textarea></textarea></td>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logoBox{
  width:75px;
  height:75px;
  background:#fff;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logoBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.centerText{
  text-align:center;
  flex:1;
}

.title{
  font-size:16px;
  font-weight:bold;
}

input{
  width:100%;
  padding:4px;
  border:1px solid #ccc;
  border-radius:3px;
}

textarea{
  width:100%;
  min-height:60px;
  padding:4px;
  resize:vertical;
}

.row{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.row div{flex:1;}

.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

.actions{
  text-align:center;
  margin:10px;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px;
  margin:5px;
  cursor:pointer;
}

canvas{
  border:1px solid #000;
  background:#fff;
  width:100%;
  height:120px;
}

@media print{
  .actions{display:none;}
  body{background:#fff;}
}

</style>
</head>

<body>

<div class="page">

<!-- الكليشة -->
<div class="header">
<div class="headerRow">

<label class="logoBox">
<img id="moeLogo">
<input type="file" accept="image/*" onchange="loadLogo(event,'moe')" hidden>
</label>

<div class="centerText">

<div>وزارة التعليم</div>

<div>
الإدارة العامة للتعليم:
<input id="eduName" placeholder="مثال: المنطقة الشرقية">
</div>

<div>
مدرسة:
<input id="schoolNameHeader">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<label class="logoBox">
<img id="schoolLogo">
<input type="file" accept="image/*" onchange="loadLogo(event,'school')" hidden>
</label>

</div>
</div>

<!-- البيانات -->
<div class="section">

<div class="row">
<div>
<label>العام الدراسي</label>
<input id="year">
</div>

<div>
<label>الفصل الدراسي</label>
<input id="term">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>التاريخ الميلادي</label>
<input type="date" id="dateGreg" onchange="convertToHijri();autoDay();">
</div>
</div>

<div class="row">
<div>
<label>التاريخ الهجري</label>
<input id="dateHijri">
</div>
</div>

</div>

<!-- الموظف -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr>
<th>الاسم</th>
<th>التوقيع الإلكتروني</th>
<th>ملاحظات</th>
</tr>
<tr>
<td><input id="staffName"></td>
<td>
<canvas id="signaturePad"></canvas>
<br>
<button onclick="clearSignature()">مسح التوقيع</button>
</td>
<td><textarea id="staffNote"></textarea></td>
</tr>
</table>

</div>

<!-- المتأخرون -->
<div class="section">
<label>المتأخرون</label>
<table id="lateTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>
<button onclick="addRow('lateTable')">إضافة</button>
</div>

<!-- المخالفون -->
<div class="section">
<label>المخالفون</label>
<table id="vioTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>
<button onclick="addRow('vioTable')">إضافة</button>
</div>

</div>

<!-- أزرار -->
<div class="actions">

<button onclick="handleSubmit()">حفظ PDF + إرسال</button>

</div>

<script>

/* رفع شعار */
function loadLogo(e,type){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>{
document.getElementById(type==="moe"?"moeLogo":"schoolLogo").src=ev.target.result;
};
reader.readAsDataURL(file);
}

/* اليوم */
function autoDay(){
const g=document.getElementById("dateGreg").value;
const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
document.getElementById("day").value=days[new Date(g).getDay()];
}

/* هجري تقريبي */
function convertToHijri(){
const g=new Date(document.getElementById("dateGreg").value);
if(!g) return;
const jd=Math.floor((g/86400000)+2440587.5);
const l=jd-1948440+10632;
const n=Math.floor((l-1)/10631);
const l2=l-10631*n+354;

const j=(Math.floor((10985-l2)/5316))*(Math.floor((50*l2)/17719))
+(Math.floor(l2/5670))*(Math.floor((43*l2)/15238));

const l3=l2-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))
-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;

const m=Math.floor((24*l3)/709);
const d=l3-Math.floor((709*m)/24);
const y=30*n+j-30;

document.getElementById("dateHijri").value=
y+"/"+m+"/"+d;
}

/* التوقيع */
let canvas=document.getElementById("signaturePad");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=draw;

function draw(e){
if(!drawing)return;
let r=canvas.getBoundingClientRect();
ctx.lineTo(e.clientX-r.left,e.clientY-r.top);
ctx.stroke();
}

function clearSignature(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();
}

/* PDF */
async function generatePDF(){
const { jsPDF } = window.jspdf;
const element=document.querySelector(".page");

const canvas=await html2canvas(element,{scale:2});
const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");
pdf.addImage(img,"PNG",0,0,210,297);
pdf.save("munawaba.pdf");
}

/* WhatsApp */
function sendWhatsApp(){

const edu=document.getElementById("eduName").value||"الإدارة العامة للتعليم";
const school=document.getElementById("schoolNameHeader").value;

let text="📋 استمارة مناوبة نهاية الدوام\n\n";

text+="الإدارة: "+edu+"\n";
text+="المدرسة: "+school+"\n";
text+="الموظف: "+document.getElementById("staffName").value+"\n";
text+="اليوم: "+document.getElementById("day").value+"\n";
text+="ميلادي: "+document.getElementById("dateGreg").value+"\n";
text+="هجري: "+document.getElementById("dateHijri").value+"\n\n";

text+="📝 ملاحظات:\n"+document.getElementById("staffNote").value+"\n";

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* تشغيل كامل */
async function handleSubmit(){
await generatePDF();
sendWhatsApp();
}

/* إضافة صف */
function addRow(id){
let r=document.getElementById(id).insertRow();
r.innerHTML=`<td><input></td><td><input></td><td><input></td><td><input></td><td><textarea></textarea></td>`;
}

</script>

</body>
</html>

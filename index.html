<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<!-- مكتبات PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

@page{size:A4;margin:0;}

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

.page{
  width:210mm;
  height:297mm;
  margin:auto;
  padding:8mm;
  box-sizing:border-box;
  position:relative;
  overflow:hidden;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logoBox{
  width:75px;
  height:75px;
  background:#fff;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logoBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.centerText{text-align:center;flex:1;}

.inlineField{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
  margin-top:5px;
}

.inlineField input{width:150px;}

.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

.row{display:flex;gap:10px;margin-top:8px;}
.row div{flex:1;}

input,textarea{
  width:100%;
  padding:4px;
  border:1px solid #ccc;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
}

.actions{text-align:center;margin:10px;}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px;
  margin:5px;
}

@media print{
  .actions{display:none;}
  body{background:#fff;}
}

</style>
</head>

<body>

<div class="page" id="report">

<div class="header">
<div class="headerRow">

<label class="logoBox">
<img id="moeLogo">
<input type="file" accept="image/*" onchange="loadLogo(event,'moe')" hidden>
</label>

<div class="centerText">

<div>وزارة التعليم</div>

<div class="inlineField">
الإدارة العامة للتعليم:
<input id="eduName">
</div>

<div class="inlineField">
مدرسة:
<input id="schoolNameHeader">
</div>

<div style="font-weight:bold">استمارة مناوبة نهاية الدوام</div>

</div>

<label class="logoBox">
<img id="schoolLogo">
<input type="file" accept="image/*" onchange="loadLogo(event,'school')" hidden>
</label>

</div>
</div>

<div class="section">

<div class="row">
<div>
<label>العام الدراسي</label>
<input id="year">
</div>

<div>
<label>الفصل الدراسي</label>
<input id="term">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>التاريخ</label>
<input type="date" id="date">
</div>
</div>

<div class="row">
<div>
<label>وقت الإرسال (ميلادي)</label>
<input id="timestampGreg" readonly>
</div>

<div>
<label>وقت الإرسال (هجري)</label>
<input id="timestampHijri" placeholder="يمكن التعديل اليدوي">
</div>
</div>

</div>

<div class="section">

<label>الموظف المناوب</label>

<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><textarea id="staffNote"></textarea></td>
</tr>
</table>

</div>

<div class="section">

<label>المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('lateTable')">إضافة</button>

</div>

<div class="section">

<label>المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th>
</tr>
</table>

<button onclick="addRow('vioTable')">إضافة</button>

</div>

<div class="footer">
<p>تُسلم الاستمارة بعد تعبئتها إلى وكيل الشؤون التعليمية</p>
<p>حقوق التصميم: مصطفى بوحسن</p>
</div>

</div>

<div class="actions">
<button onclick="handleSubmit()">حفظ وإرسال</button>
<button onclick="window.print()">PDF</button>
</div>

<script>

/* رفع الشعار */
function loadLogo(e,t){
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=x=>{
if(t==="moe"){moeLogo.src=x.target.result;}
else{schoolLogo.src=x.target.result;}
};
r.readAsDataURL(f);
}

/* التوثيق الزمني */
function generateTimestamp(){

const now=new Date();

timestampGreg.value=now.toLocaleString('ar-SA');

/* لا نعدل إذا المستخدم عدل يدوي */
if(timestampHijri.dataset.edited==="true") return;

const hijri=new Intl.DateTimeFormat('ar-SA-u-ca-islamic',{
day:'numeric',month:'numeric',year:'numeric'
}).format(now);

timestampHijri.value=
hijri+" - "+now.getHours()+":"+now.getMinutes()+":"+now.getSeconds();

}

/* تتبع التعديل اليدوي */
document.getElementById("timestampHijri").addEventListener("input",function(){
this.dataset.edited="true";
});

/* PDF */
async function generateAndDownloadPDF(){

const { jsPDF } = window.jspdf;

const element=document.getElementById("report");

const canvas=await html2canvas(element,{scale:2,useCORS:true});

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

pdf.addImage(img,"PNG",0,0,210,297);

let fileName="استمارة_مناوبة_"+schoolNameHeader.value+"_"+date.value+".pdf";

pdf.save(fileName);

}

/* واتساب */
function sendWhatsApp(){

let text="📋 استمارة مناوبة نهاية الدوام\n\n";

text+="الإدارة العامة للتعليم "+eduName.value+"\n";
text+="المدرسة: "+schoolNameHeader.value+"\n";
text+="التاريخ: "+date.value+"\n";
text+="الموظف: "+staffName.value+"\n\n";

text+="🕒 وقت الإرسال:\n";
text+=timestampGreg.value+"\n"+timestampHijri.value+"\n\n";

text+="📝 الملاحظات:\n"+staffNote.value+"\n";

text+="\n✅ تم تعبئة الاستمارة بنجاح";

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

/* التنفيذ */
async function handleSubmit(){

if(!schoolNameHeader.value || !staffName.value){
alert("أكمل البيانات الأساسية");
return;
}

generateTimestamp();

await generateAndDownloadPDF();

sendWhatsApp();

}

/* إضافة صف */
function addRow(id){
let r=document.getElementById(id).insertRow();
r.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><textarea></textarea></td>
`;
}

</script>

</body>
</html>

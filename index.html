<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* =========================
   خلفية عامة
========================= */
body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

/* =========================
   الصفحة (مهم للطباعة)
========================= */
.page{
  width:210mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

/* =========================
   الكليشة
========================= */
.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:75px;
  height:75px;
  object-fit:contain;
  background:#fff;
  padding:3px;
  border-radius:4px;
}

/* النص الأوسط */
.centerText{
  text-align:center;
  flex:1;
}

.title{
  font-size:16px;
  font-weight:bold;
  margin-top:5px;
}

/* =========================
   صفوف إدخال الكليشة
========================= */
.row{
  display:flex;
  gap:10px;
  margin-top:6px;
}

.row div{
  flex:1;
}

.row input{
  width:100%;
  padding:5px;
  border-radius:3px;
  border:1px solid #ccc;
}

/* =========================
   الأقسام
========================= */
.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

label{
  font-weight:bold;
  font-size:13px;
}

/* =========================
   الجداول (بيضاء)
========================= */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
  background:#fff;
}

/* =========================
   أزرار
========================= */
.actions{
  text-align:center;
  margin:10px;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px 10px;
  margin:5px;
  cursor:pointer;
}

/* =========================
   QR
========================= */
#qrcode{
  margin-top:10px;
}

/* =========================
   منع ظهور العناصر في الطباعة
========================= */
@media print{

  .actions,
  #dashboard{
    display:none !important;
  }

  body{
    background:#fff;
  }

  .page{
    background:#fff;
  }

  img{
    print-color-adjust: exact;
  }
}

</style>
</head>

<body>

<!-- =========================
   الصفحة الرئيسية
========================= -->
<div class="page" id="report">

<!-- الكليشة -->
<div class="header">

<div class="headerRow">

<img id="moeLogo" class="logo">

<div class="centerText">

<div>وزارة التعليم</div>

<div>
الإدارة العامة للتعليم:
<input id="eduName">
</div>

<div>
مدرسة:
<input id="schoolNameHeader">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<img id="schoolLogo" class="logo">

</div>
</div>

<!-- بيانات -->
<div class="section">

<div class="row">
<div>
<label>العام الدراسي</label>
<input id="year">
</div>

<div>
<label>الفصل الدراسي</label>
<input id="term">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>التاريخ</label>
<input id="date" type="date">
</div>
</div>

</div>

<!-- الموظف -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr><th>الاسم</th><th>التوقيع</th><th>ملاحظات</th></tr>
<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><input id="staffNote"></td>
</tr>
</table>

</div>

<!-- المتأخرون -->
<div class="section">

<label>المتأخرون</label>

<table id="lateTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>

<button onclick="addRow('lateTable')">إضافة</button>

</div>

<!-- المخالفون -->
<div class="section">

<label>المخالفون</label>

<table id="vioTable">
<tr><th>الاسم</th><th>الفصل</th><th>الزمن</th><th>الإجراء</th><th>ملاحظات</th></tr>
</table>

<button onclick="addRow('vioTable')">إضافة</button>

</div>

<!-- QR -->
<div class="section">

<label>رمز التحقق</label>
<div id="qrcode"></div>

</div>

</div>

<!-- أزرار -->
<div class="actions">

<button onclick="generateQR();saveReport();sendWhatsApp();">حفظ وإرسال</button>
<button onclick="window.print()">PDF</button>

</div>

<script>

let reportId = Date.now();

/* =========================
   QR
========================= */
function generateQR(){

  document.getElementById("qrcode").innerHTML="";

  let data = {
    id:reportId,
    school:document.getElementById("schoolNameHeader").value,
    date:document.getElementById("date").value
  };

  new QRCode(document.getElementById("qrcode"),{
    text:JSON.stringify(data),
    width:120,
    height:120
  });

}

/* =========================
   حفظ
========================= */
function saveReport(){

  let data = {
    id:reportId,
    school:document.getElementById("schoolNameHeader").value,
    date:document.getElementById("date").value,
    staff:document.getElementById("staffName").value,
    note:document.getElementById("staffNote").value
  };

  localStorage.setItem("report_"+reportId, JSON.stringify(data));

}

/* =========================
   WhatsApp شامل
========================= */
function sendWhatsApp(){

  let text = "📋 استمارة مناوبة نهاية الدوام\n\n";

  text += "الإدارة: الإدارة العامة للتعليم\n";
  text += "المدرسة: " + document.getElementById("schoolNameHeader").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n\n";

  text += "📝 ملاحظات:\n" + document.getElementById("staffNote").value + "\n\n";

  text += "✅ تم تعبئة الاستمارة بنجاح";

  window.open("https://wa.me/?text="+encodeURIComponent(text));

}

/* =========================
   إضافة صفوف
========================= */
function addRow(id){
  let r=document.getElementById(id).insertRow();
  r.innerHTML="<td><input></td><td><input></td><td><input></td><td><input></td><td><input></td>";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#dff3e3;
}

.container{
  width:210mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.row{display:flex;gap:10px;margin-top:10px;}
.row > div{flex:1;}

.section{
  background:#fff;
  padding:10px;
  margin-top:10px;
}

input,textarea{
  width:100%;
  padding:6px;
  box-sizing:border-box;
}

canvas{
  width:100%;
  height:120px;
  border:1px solid #000;
  background:#fff;
  touch-action:none;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:0;
  padding:8px;
  margin:5px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container" id="form">

<div class="header">
وزارة التعليم<br>

الإدارة:
<input id="edu">

</div>

<div class="section">

<div class="row">
<div>
<label>المدرسة</label>
<input id="school">
</div>

<div>
<label>التاريخ الميلادي</label>
<input type="date" id="greg" onchange="updateDate()">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>الهجري</label>
<input id="hijri">
</div>
</div>

</div>

<div class="section">

<label>الموظف</label>
<input id="name">

<label>التوقيع</label>
<canvas id="sig"></canvas>

<button onclick="clearSig()">مسح التوقيع</button>

</div>

<div class="section">
<label>ملاحظات</label>
<textarea id="notes"></textarea>
</div>

<button onclick="generate()">حفظ PDF + إرسال</button>

</div>

<script>

/* ===== STATE ===== */
const state = {};

/* ===== التاريخ ===== */
function updateDate(){

const d = new Date(document.getElementById("greg").value);
if(!d) return;

const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
document.getElementById("day").value = days[d.getDay()];

/* هجري تقريبي */
let jd=Math.floor((d/86400000)+2440587.5);
let h=jd-1948440+10632;
let n=Math.floor((h-1)/10631);
let r=h-10631*n+354;
let m=Math.floor((24*r)/709);
let dd=r-Math.floor((709*m)/24);
let y=30*n+1;

document.getElementById("hijri").value = y+"/"+m+"/"+dd;

}

/* ===== التوقيع ===== */
const canvas=document.getElementById("sig");
const ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("pointerdown",()=>drawing=true);
canvas.addEventListener("pointerup",()=>drawing=false);
canvas.addEventListener("pointermove",(e)=>{

if(!drawing) return;

let r=canvas.getBoundingClientRect();

ctx.lineWidth=2;
ctx.lineTo(e.clientX-r.left,e.clientY-r.top);
ctx.stroke();

});

function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();
}

/* ===== PDF ===== */
async function generate(){

const { jsPDF } = window.jspdf;

const el=document.getElementById("form");

const canvasImg=await html2canvas(el,{scale:2});

const img=canvasImg.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

pdf.addImage(img,"PNG",0,0,210,297);

pdf.save("munawaba.pdf");

/* بعد PDF */
sendWhatsApp();

}

/* ===== WhatsApp ===== */
function sendWhatsApp(){

let text="📋 استمارة مناوبة\n\n";

text+="الإدارة: "+document.getElementById("edu").value+"\n";
text+="المدرسة: "+document.getElementById("school").value+"\n";
text+="الموظف: "+document.getElementById("name").value+"\n";
text+="التاريخ: "+document.getElementById("greg").value+"\n";
text+="الهجري: "+document.getElementById("hijri").value+"\n";
text+="الملاحظات: "+document.getElementById("notes").value+"\n";

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

</script>

</body>
</html>

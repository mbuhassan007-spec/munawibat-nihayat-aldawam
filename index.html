<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  background:#dff3e3;
  font-family:Arial;
  margin:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:10mm;
  background:#dff3e3;
}

.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logoBox{
  width:75px;
  height:75px;
  background:#fff;
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logoBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.centerText{text-align:center;flex:1;}
.title{font-size:16px;font-weight:bold;}

input,textarea{
  width:100%;
  padding:4px;
  border:1px solid #ccc;
  border-radius:3px;
}

textarea{min-height:60px;}

.row{display:flex;gap:10px;margin-top:8px;}
.row div{flex:1;}

.section{
  background:#fff;
  margin-top:8px;
  padding:8px;
  border:1px solid #1f6f3a;
}

canvas{
  width:100%;
  height:120px;
  border:1px solid #000;
  background:#fff;
  touch-action:none;
}

button{
  background:#1f6f3a;
  color:#fff;
  border:none;
  padding:8px;
  margin:5px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="page" id="form">

<div class="header">
وزارة التعليم
<div>
الإدارة:
<input id="eduName">
</div>
</div>

<div class="section">

<div class="row">
<div>
<label>المدرسة</label>
<input id="school">
</div>

<div>
<label>التاريخ</label>
<input type="date" id="date" onchange="updateDate()">
</div>
</div>

<div class="row">
<div>
<label>اليوم</label>
<input id="day">
</div>

<div>
<label>الهجري</label>
<input id="hijri">
</div>
</div>

</div>

<div class="section">

<label>الموظف</label>
<input id="name">

<label>التوقيع الإلكتروني</label>
<canvas id="sig"></canvas>

<button onclick="clearSig()">مسح التوقيع</button>

</div>

<div class="section">
<label>ملاحظات</label>
<textarea id="notes"></textarea>
</div>

<button onclick="generatePDF()">حفظ PDF + إرسال</button>

</div>

<script>

/* ===== التاريخ ===== */
function updateDate(){

const d=new Date(document.getElementById("date").value);
if(!d) return;

const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
document.getElementById("day").value=days[d.getDay()];

/* هجري تقريبي */
let jd=Math.floor((d/86400000)+2440587.5);
let h=jd-1948440+10632;
let n=Math.floor((h-1)/10631);
let r=h-10631*n+354;
let m=Math.floor((24*r)/709);
let dd=r-Math.floor((709*m)/24);
let y=30*n+1;

document.getElementById("hijri").value=y+"/"+m+"/"+dd;

}

/* ===== التوقيع ===== */
let canvas=document.getElementById("sig");
let ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("pointerdown",()=>drawing=true);
canvas.addEventListener("pointerup",()=>drawing=false);

canvas.addEventListener("pointermove",(e)=>{
if(!drawing) return;

let r=canvas.getBoundingClientRect();

ctx.lineWidth=2;
ctx.lineCap="round";

ctx.lineTo(e.clientX-r.left,e.clientY-r.top);
ctx.stroke();

});

function clearSig(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.beginPath();
}

/* ===== تحويل Canvas إلى صورة ===== */
function getSignatureImage(){
return canvas.toDataURL("image/png");
}

/* ===== PDF احترافي ===== */
async function generatePDF(){

const { jsPDF } = window.jspdf;

const element=document.getElementById("form");

const canvasScreen=await html2canvas(element,{scale:2});
const img=canvasScreen.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

/* الصفحة الأساسية */
pdf.addImage(img,"PNG",0,0,210,297);

/* إضافة التوقيع داخل PDF بشكل مستقل (احترافي) */
const signImg=getSignatureImage();

pdf.addImage(signImg,"PNG",120,210,60,25); 
// مكان التوقيع داخل PDF

pdf.save("munawaba.pdf");

/* إرسال واتساب */
sendWhatsApp();

}

/* ===== WhatsApp ===== */
function sendWhatsApp(){

let text="📋 استمارة مناوبة\n\n";

text+="الإدارة: "+document.getElementById("eduName").value+"\n";
text+="المدرسة: "+document.getElementById("school").value+"\n";
text+="الموظف: "+document.getElementById("name").value+"\n";
text+="التاريخ: "+document.getElementById("date").value+"\n";
text+="الهجري: "+document.getElementById("hijri").value+"\n";
text+="الملاحظات: "+document.getElementById("notes").value+"\n";

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

</script>

</body>
</html>

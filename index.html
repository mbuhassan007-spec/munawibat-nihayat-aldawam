<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير المناوبة اليومي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
  font-family: Arial;
  background:#fff;
  margin:0;
  padding:0;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  padding:12mm;
  box-sizing:border-box;
}

/* الكليشة الرسمية */
.header{
  border:2px solid #1f4e79;
  padding:10px;
  margin-bottom:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:75px;
  height:75px;
  object-fit:contain;
}

.centerText{
  text-align:center;
  flex:1;
}

.ministry{
  font-size:14px;
  font-weight:bold;
  color:#1f4e79;
}

.edu{
  font-size:12px;
}

.title{
  font-size:16px;
  font-weight:bold;
  color:#1f4e79;
}

/* الأقسام */
.section{
  border:1px solid #1f4e79;
  padding:8px;
  margin-top:10px;
}

label{
  font-weight:bold;
  font-size:13px;
}

input{
  width:100%;
  padding:5px;
  margin-top:3px;
  border:1px solid #000;
}

/* الجداول */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:5px;
}

th,td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
}

th{
  background:#1f4e79;
  color:white;
}

/* أزرار */
.actions{
  text-align:center;
  margin:10px;
}

button{
  padding:8px 12px;
  margin:5px;
  background:#1f4e79;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* طباعة */
@media print{
  .actions{display:none;}
}

</style>
</head>

<body>

<div class="page" id="report">

<!-- الكليشة -->
<div class="header">

<div class="headerRow">

<img id="moeLogo" class="logo">

<div class="centerText">
  <div class="ministry">وزارة التعليم</div>
  <div class="edu">الإدارة العامة للتعليم</div>
  <div class="title">تقرير المناوبة اليومي</div>
</div>

<img id="schoolLogo" class="logo">

</div>

</div>

<!-- رفع الشعارات -->
<div class="section">

<label>شعار وزارة التعليم</label>
<input type="file" accept="image/*" onchange="loadLogo(event,'moe')">

<label>شعار المدرسة</label>
<input type="file" accept="image/*" onchange="loadLogo(event,'school')">

</div>

<!-- بيانات المدرسة -->
<div class="section">

<label>اسم المدرسة</label>
<input id="school">

<label>العام الدراسي</label>
<input id="year">

<label>الفصل الدراسي</label>
<input id="term">

<label>اليوم</label>
<input id="day">

<label>التاريخ</label>
<input type="date" id="date">

</div>

<!-- الموظف -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr>
<th>الاسم</th>
<th>التوقيع</th>
<th>ملاحظات</th>
</tr>

<tr>
<td><input id="staffName"></td>
<td><input id="staffSign" placeholder="الاسم كتوقيع"></td>
<td><input id="staffNote"></td>
</tr>

</table>

</div>

<!-- المتأخرون -->
<div class="section">

<label>الطلاب المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button onclick="addLate()">+ إضافة طالب</button>

</div>

<!-- المخالفون -->
<div class="section">

<label>الطلاب المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button onclick="addVio()">+ إضافة طالب</button>

</div>

<!-- التوقيعات -->
<div class="section">

<label>وكيل الشؤون التعليمية</label>
<input id="agent">

<label>مدير المدرسة</label>
<input id="principal">

</div>

<div class="section" style="text-align:center;font-size:13px;">
يتم تسليم هذا التقرير إلى وكيل الشؤون التعليمية في اليوم التالي للمناوبة.
</div>

<div style="text-align:center;font-size:11px;">
حقوق التصميم محفوظة: مصطفى بوحسن
</div>

</div>

<!-- أزرار -->
<div class="actions">
<button onclick="downloadPDF()">حفظ PDF</button>
<button onclick="sendWhatsApp()">إرسال واتساب</button>
</div>

<script>

/* رفع الشعارات */
function loadLogo(event,type){

  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    if(type === 'moe'){
      document.getElementById("moeLogo").src = e.target.result;
    }

    if(type === 'school'){
      document.getElementById("schoolLogo").src = e.target.result;
    }

  };

  reader.readAsDataURL(file);
}

/* إضافة متأخرين */
function addLate(){
  const row = document.getElementById("lateTable").insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

/* إضافة مخالفين */
function addVio(){
  const row = document.getElementById("vioTable").insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

/* PDF */
function downloadPDF(){
  html2pdf().set({
    margin:0,
    filename:'تقرير_المناوبة.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(document.getElementById("report")).save();
}

/* WhatsApp شامل */
function sendWhatsApp(){

  let text = "📋 تقرير المناوبة اليومي\n\n";

  text += "المدرسة: " + document.getElementById("school").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n";

  text += "\nتم إعداد التقرير إلكترونيًا.";

  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

</script>

</body>
</html>

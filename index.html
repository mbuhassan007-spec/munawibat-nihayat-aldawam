<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استمارة مناوبة نهاية الدوام</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* =========================
   الخلفية العامة
========================= */
body{
  background:#dff3e3;
  font-family: Arial;
  margin:0;
  padding:0;
}

/* =========================
   الصفحة (A4)
========================= */
.page{
  width:210mm;
  height:297mm;
  margin:auto;
  padding:10mm;
  box-sizing:border-box;
  overflow:hidden; /* مهم لمنع التمدد */
}

/* =========================
   الكليشة
========================= */
.header{
  background:#1f6f3a;
  color:#fff;
  padding:10px;
}

.headerRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* الشعارات */
.logo{
  width:75px;
  height:75px;
  object-fit:contain;
  background:#fff;
  padding:3px;
  border-radius:4px;
}

/* النص الأوسط */
.centerText{
  text-align:center;
  flex:1;
}

.ministry{
  font-size:15px;
  font-weight:bold;
}

.edu, .schoolName{
  font-size:13px;
}

.title{
  font-size:16px;
  font-weight:bold;
  margin-top:4px;
}

/* إدخالات الكليشة */
.header input{
  width:180px;
  padding:3px;
  border:none;
  border-radius:3px;
  margin-top:3px;
}

/* صفوف مختصرة */
.metaRow{
  display:flex;
  justify-content:space-around;
  margin-top:6px;
  font-size:12px;
}

/* =========================
   الأقسام
========================= */
.section{
  border:1px solid #1f6f3a;
  padding:8px;
  margin-top:8px;
  background:#fff;
}

label{
  font-weight:bold;
  font-size:13px;
}

/* =========================
   الجداول (بيضاء بالكامل)
========================= */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:6px;
  background:#fff;
}

th, td{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
  text-align:center;
  background:#fff;
}

th{
  font-weight:bold;
}

/* =========================
   الأزرار
========================= */
.actions{
  text-align:center;
  margin:10px;
}

button{
  padding:8px 12px;
  margin:5px;
  background:#1f6f3a;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:3px;
}

/* =========================
   الطباعة
========================= */
@media print{
  .actions{display:none;}
}

</style>
</head>

<body>

<div class="page" id="report">

<!-- =========================
     الكليشة
========================= -->
<div class="header">

<div class="headerRow">

<img id="moeLogo" class="logo">

<div class="centerText">

<div class="ministry">وزارة التعليم</div>

<div class="edu">
الإدارة العامة للتعليم:
<br>
<input id="eduName" placeholder="اكتب الإدارة التعليمية">
</div>

<div class="schoolName">
مدرسة:
<br>
<input id="schoolNameHeader" placeholder="اسم المدرسة">
</div>

<div class="title">استمارة مناوبة نهاية الدوام</div>

</div>

<img id="schoolLogo" class="logo">

</div>

</div>

<!-- =========================
     رفع الشعارات
========================= -->
<div class="section">

<label>شعار وزارة التعليم</label>
<input type="file" accept="image/*" onchange="loadLogo(event,'moe')">

<label>شعار المدرسة</label>
<input type="file" accept="image/*" onchange="loadLogo(event,'school')">

</div>

<!-- =========================
     بيانات إضافية
========================= -->
<div class="section">

<label>العام الدراسي</label>
<input id="year">

<label>الفصل الدراسي</label>
<input id="term">

<label>اليوم</label>
<input id="day">

<label>التاريخ</label>
<input type="date" id="date">

</div>

<!-- =========================
     الموظف
========================= -->
<div class="section">

<label>الموظف المناوب</label>

<table>
<tr>
<th>الاسم</th>
<th>التوقيع</th>
<th>ملاحظات</th>
</tr>

<tr>
<td><input id="staffName"></td>
<td><input id="staffSign"></td>
<td><input id="staffNote"></td>
</tr>
</table>

</div>

<!-- =========================
     المتأخرون
========================= -->
<div class="section">

<label>الطلاب المتأخرون</label>

<table id="lateTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button onclick="addLate()">+ إضافة طالب</button>

</div>

<!-- =========================
     المخالفون
========================= -->
<div class="section">

<label>الطلاب المخالفون</label>

<table id="vioTable">
<tr>
<th>الاسم</th>
<th>الفصل</th>
<th>الزمن</th>
<th>الإجراء</th>
<th>ملاحظات</th>
</tr>
</table>

<button onclick="addVio()">+ إضافة طالب</button>

</div>

<!-- =========================
     التوقيعات
========================= -->
<div class="section">

<label>وكيل الشؤون التعليمية</label>
<input id="agent">

<label>مدير المدرسة</label>
<input id="principal">

</div>

<!-- =========================
     ختام
========================= -->
<div class="section" style="text-align:center;font-size:13px;">
يتم تسليم هذا التقرير إلى وكيل الشؤون التعليمية في اليوم التالي للمناوبة.
</div>

<div style="text-align:center;font-size:11px;">
حقوق التصميم محفوظة: مصطفى بوحسن
</div>

</div>

<!-- =========================
     الأزرار
========================= -->
<div class="actions">

<button onclick="downloadPDF()">حفظ PDF</button>
<button onclick="sendWhatsApp()">إرسال واتساب</button>

</div>

<script>

/* =========================
   رفع الشعارات
========================= */
function loadLogo(event,type){

  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    if(type === 'moe'){
      document.getElementById("moeLogo").src = e.target.result;
    }

    if(type === 'school'){
      document.getElementById("schoolLogo").src = e.target.result;
    }

  };

  reader.readAsDataURL(file);
}

/* =========================
   إضافة طلاب
========================= */
function addLate(){
  const row = document.getElementById("lateTable").insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

function addVio(){
  const row = document.getElementById("vioTable").insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

/* =========================
   PDF
========================= */
function downloadPDF(){

  html2pdf().set({
    margin:0,
    filename:'تقرير_المناوبة.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all']}
  }).from(document.getElementById("report")).save();

}

/* =========================
   WhatsApp
========================= */
function sendWhatsApp(){

  let text = "📋 استمارة مناوبة نهاية الدوام\n\n";

  text += "الإدارة: " + document.getElementById("eduName").value + "\n";
  text += "المدرسة: " + document.getElementById("schoolNameHeader").value + "\n";
  text += "التاريخ: " + document.getElementById("date").value + "\n";
  text += "الموظف: " + document.getElementById("staffName").value + "\n";

  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");

}

</script>

</body>
</html>
